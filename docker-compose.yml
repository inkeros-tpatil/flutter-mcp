services:
  postgres:
    image: postgres:16
    container_name: dev_postgres
    environment:
      POSTGRES_USER: devuser
      POSTGRES_PASSWORD: devpassword
      POSTGRES_DB: devdb
    ports:
      - "5434:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U devuser -d devdb"]
      interval: 5s
      timeout: 5s
      retries: 5

  phoenix:
    image: arizephoenix/phoenix:latest
    container_name: dev_phoenix
    ports:
      - "6006:6006"
      - "4317:4317"
      - "4318:4318"

  # ----------------------------- ADDED: graph DB -----------------------------
  memgraph:
    image: memgraph/memgraph-mage:latest   # MAGE bundle includes vector_search
    container_name: dev_memgraph
    command: ["--log-level=WARNING", "--also-log-to-stderr"]
    ports:
      - "7687:7687"   # Bolt — the mcp pipeline connects here
      - "7444:7444"   # monitoring
    volumes:
      - memgraph_data:/var/lib/memgraph
      - memgraph_log:/var/log/memgraph
    healthcheck:
      test: ["CMD-SHELL", "echo 'RETURN 1;' | mgconsole || exit 1"]
      interval: 5s
      timeout: 5s
      retries: 10

  # ------------------------- ADDED: graph DB browser -------------------------
  memgraph-lab:
    image: memgraph/lab:latest
    container_name: dev_memgraph_lab
    ports:
      - "3000:3000"   # open http://localhost:3000 to see nodes & edges
    environment:
      QUICK_CONNECT_MG_HOST: memgraph
      QUICK_CONNECT_MG_PORT: 7687
    depends_on:
      memgraph:
        condition: service_healthy

  mcp:
    build: ./pipeline
    container_name: dev_mcp
    environment:
      DATABASE_URL: postgresql://devuser:devpassword@postgres:5432/devdb
      MCP_TRANSPORT: sse
      MCP_PORT: 8000
      PHOENIX_ENDPOINT: http://phoenix:4317
      # ----------------------- ADDED: Graph RAG config -----------------------
      MEMGRAPH_URI: bolt://memgraph:7687
      EMBEDDING_PROVIDER: local          # set "openai" + OPENAI_API_KEY to switch
      OTEL_EXPORTER_OTLP_PROTOCOL: grpc  # Phoenix :4317
      OTEL_SERVICE_NAME: flutter-graph-rag
      VECTOR_TOP_K: "8"
      TRAVERSAL_DEPTH: "2"
      RESULT_TOP_N: "6"
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      phoenix:
        condition: service_started
      memgraph:                          # ADDED
        condition: service_healthy

volumes:
  postgres_data:
  memgraph_data:      # ADDED
  memgraph_log:       # ADDED